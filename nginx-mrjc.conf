# ══════════════════════════════════════════════════════════════════
# nginx-mrjc.conf — Configuration Nginx pour mrjc.jt-crea.com
# ══════════════════════════════════════════════════════════════════
# À placer dans :
#   Plesk → mrjc.jt-crea.com → Apache & nginx → nginx additionnel
#   (section "Directives nginx additionnelles pour HTTPS")
#
# Ou via SSH dans :
#   /etc/nginx/plesk.conf.d/vhosts/mrjc.jt-crea.com.conf
# ══════════════════════════════════════════════════════════════════

# Upstream : Next.js tourne sur le port attribué par Plesk (ex: 3000)
# ⚠️  Remplacer 3000 par le port réel affiché dans Plesk Node.js
upstream nextjs_mrjc {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name mrjc.jt-crea.com;

    # Redirection forcée HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mrjc.jt-crea.com;

    # ── SSL (géré automatiquement par Plesk Let's Encrypt) ──────
    # Plesk remplace ces chemins automatiquement
    ssl_certificate     /etc/letsencrypt/live/mrjc.jt-crea.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mrjc.jt-crea.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── En-têtes sécurité ────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"            always;
    add_header X-Content-Type-Options  "nosniff"               always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Cache des assets statiques Next.js ───────────────────────
    location /_next/static/ {
        alias /var/www/vhosts/jt-crea.com/mrjc.jt-crea.com/httpdocs/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /assets/ {
        alias /var/www/vhosts/jt-crea.com/mrjc.jt-crea.com/httpdocs/public/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Proxy vers Next.js pour toutes les autres requêtes ───────
    location / {
        proxy_pass         http://nextjs_mrjc;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';

        # Headers pour Next.js
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout  60s;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;

        # Buffer
        proxy_buffer_size      128k;
        proxy_buffers          4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── Gzip compression ─────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    # ── Logs ─────────────────────────────────────────────────────
    access_log /var/log/nginx/mrjc.jt-crea.com.access.log;
    error_log  /var/log/nginx/mrjc.jt-crea.com.error.log warn;
}
